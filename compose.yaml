name: focused-agent

x-database-url: &database-url postgresql://focused_agent:focused_agent@db:5432/focused_agent
x-object-storage: &object-storage
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: invoice-documents
  S3_ACCESS_KEY_ID: focused_agent
  S3_SECRET_ACCESS_KEY: focused_agent_secret
  S3_FORCE_PATH_STYLE: "true"
x-email: &email
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_FROM: reconciliation@example.test
x-agent: &agent
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  AGENT_MODEL: ${AGENT_MODEL}

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: focused_agent
      POSTGRES_USER: focused_agent
      POSTGRES_PASSWORD: focused_agent
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focused_agent -d focused_agent"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: focused_agent
      MINIO_ROOT_PASSWORD: focused_agent_secret
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  setup:
    build:
      context: .
      target: setup
    environment:
      DATABASE_URL: *database-url
      NODE_ENV: production
      SEED_DEMO_DATA: "true"
      <<: [*object-storage, *email, *agent]
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: .
      target: setup
    command: ["pnpm", "agent:worker"]
    environment:
      DATABASE_URL: *database-url
      NODE_ENV: production
      <<: [*object-storage, *email, *agent]
    depends_on:
      setup:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: *database-url
      NODE_ENV: production
      <<: [*object-storage, *email, *agent]
    depends_on:
      setup:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
      worker:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
