name: focused-agent

x-database-url: &database-url postgresql://focused_agent:focused_agent@db:5432/focused_agent

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: focused_agent
      POSTGRES_USER: focused_agent
      POSTGRES_PASSWORD: focused_agent
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focused_agent -d focused_agent"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  setup:
    build:
      context: .
      target: setup
    environment:
      DATABASE_URL: *database-url
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: *database-url
      NODE_ENV: production
    depends_on:
      setup:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
