name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://focused_agent:focused_agent@127.0.0.1:5432/focused_agent
      NODE_ENV: test
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_BUCKET: invoice-documents
      S3_ACCESS_KEY_ID: focused_agent
      S3_SECRET_ACCESS_KEY: focused_agent_secret
      S3_FORCE_PATH_STYLE: "true"
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: reconciliation@example.test
      SEED_DEMO_DATA: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: docker compose up -d --wait db minio mailpit
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:setup
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: docker build --target runner .
